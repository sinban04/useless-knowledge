<h2 id="%EB%AA%A9%EC%B0%A8">목차</h2>
<ol>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="241-8%EB%8B%A8%EA%B3%84-cascade-%EC%A0%84%EC%B2%B4-%ED%9D%90%EB%A6%84">2.4.1 8단계 cascade 전체 흐름</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>ligand → GPCR → Gα(GDP→GTP) / Gβγ 분리
                    ↓
                PLCβ2 활성화
                    ↓
                PIP2 → IP3 + DAG
                    ↓
                IP3R → ER에서 Ca²⁺ 폭발 방출
                    ↓
                TRPM5 (Ca²⁺ 게이트) → 막 탈분극
                    ↓
                CALHM1/3 메가포어 (전압 + Ca²⁺) → ATP 누출
                    ↓
                미각 신경 P2X2/P2X3 → 활동 전위
</code></pre>
<p>총 증폭률 ≈ <strong>10³~10⁴배</strong> (nM ligand → μM ATP 신호)</p>
<footer>2026-05-15 · Probe Lab Seminar</footer>
</section>

<h2 id="%EB%B6%84%EC%9E%90-%EC%9A%A9%EC%96%B4-1--conformation">분자 용어 1 — Conformation</h2>
<p><strong>분자의 3차원 자세(모양)</strong></p>
<ul>
<li>같은 원자 구성·결합이라도 단일결합 회전으로 여러 자세</li>
<li>자세마다 결합 파트너·기능이 달라짐</li>
<li><strong>단백질은 자기 모양을 바꿔서 일한다</strong></li>
<li>신호 전달 = &quot;한 단백질 자세 변화 → 옆 단백질 자세 변화&quot;의 연쇄</li>
</ul>
<p>비유: 사람의 자세 (팔 벌림·주먹 쥠) — 자유로운 변환</p>

<h2 id="%EB%B6%84%EC%9E%90-%EC%9A%A9%EC%96%B4-2--gdpgtp-cycle">분자 용어 2 — GDP/GTP cycle</h2>
<p>G-protein은 손에 쥔 명찰을 갈아끼우며 on/off</p>
<ul>
<li><strong>GDP</strong> (인산 2개) = &quot;off&quot; 명찰</li>
<li><strong>GTP</strong> (인산 3개) = &quot;on&quot; 명찰 (에너지 충전)</li>
<li>Gα는 그대로, <strong>쥔 nucleotide만</strong> 바뀜</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>[Gα·GDP off] → GPCR 자극 → [Gα·GTP on] → effector 활성화
                                            ↓
                                      Gα 자체 GTPase
                                            ↓
[Gα·GDP off] ← 자동 복귀 ← [GTP → GDP 가수분해]
</code></pre>
<p>분자 권총의 <strong>안전장치 cycle</strong></p>
<footer>2026-05-15 · Probe Lab Seminar</footer>
</section>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="step-1--gpcr-%EC%A2%85%EB%A5%98-t1r--t2r">Step 1 — GPCR 종류 (T1R · T2R)</h2>
<p>7번 막 관통 단백질. binding pocket이 분자 모양 인식.</p>
<table>
<thead>
<tr>
<th>modality</th>
<th>구성</th>
<th>Class</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>단</strong></td>
<td>T1R2 + T1R3 heterodimer</td>
<td>Class C</td>
</tr>
<tr>
<td><strong>감칠</strong></td>
<td>T1R1 + T1R3 heterodimer</td>
<td>Class C</td>
</tr>
<tr>
<td><strong>쓴</strong></td>
<td>T2R 가족 (~25종)</td>
<td>Class A</td>
</tr>
</tbody>
</table>
<ul>
<li>한 cell = 한 modality (T1R2 cell vs T1R1 cell 배타적)</li>
<li>T1R3는 두 partner 중 <strong>하나와만</strong> 짝</li>
<li>쓴 cell은 다수 T2R 동시 발현 → 분자 구분 약, 안전망 우선</li>
</ul>
<footer>2026-05-15 · Probe Lab Seminar</footer>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="step-2-4--g-protein-%E2%86%92-plc%CE%B22-%E2%86%92-ip3-%E2%86%92-ca%C2%B2%E2%81%BA">Step 2-4 — G-protein → PLCβ2 → IP3 → Ca²⁺</h2>
<ul>
<li><strong>Gα-gustducin</strong> = 미각 전용 G-protein (KO 마우스 미각 거의 소실)</li>
<li>Gα·GTP·Gβγ 분리 → <strong>Gβγ가 PLCβ2 활성화</strong></li>
<li>PLCβ2 → 막의 <strong>PIP2를 IP3 + DAG로 가수분해</strong></li>
<li>IP3가 <strong>ER 막의 IP3R 결합</strong> → ER → 세포질 Ca²⁺ 방출</li>
</ul>
<p><strong>ER 안 [Ca²⁺] ≈ 0.5 mM, 세포질 ≈ 100 nM — 약 5000배 차</strong> → 한순간에 폭발 방출</p>
<p>→ cascade의 <strong>가장 큰 amplification 단계</strong></p>
<footer>2026-05-15 · Probe Lab Seminar</footer>

<h2 id="step-5--trpm5-ca%C2%B2%E2%81%BA-%E2%86%92-%EB%A7%89-%ED%83%88%EB%B6%84%EA%B7%B9">Step 5 — TRPM5: Ca²⁺ → 막 탈분극</h2>
<p><strong>TRPM5</strong> = Ca²⁺-activated cation channel</p>
<ul>
<li>세포질 Ca²⁺ 상승이 게이트</li>
<li>Na⁺ 유입 → 막 탈분극 (-60 → 0 mV)</li>
<li>TRPM5 KO 마우스: 단·쓴·감칠 응답 거의 소실 (in vivo 핵심 증명)</li>
</ul>
<p><strong>왜 TRPM5인가?</strong> 미각 cell은 진정 neuron 아니라 Nav 약함 → <strong>Ca²⁺ activation 우회로</strong>로 막전위 생성</p>
<footer>2026-05-15 · Probe Lab Seminar</footer>

<h2 id="step-6-7--calhm13-%E2%86%92-atp-%EB%88%84%EC%B6%9C">Step 6-7 — CALHM1/3 → ATP 누출</h2>
<p><strong>CALHM1/3</strong> = 메가포어 채널 (직경 ~14 Å)</p>
<ul>
<li><strong>8 subunit</strong> octameric ring (cryo-EM)</li>
<li>전압 + Ca²⁺ <strong>이중 게이트</strong></li>
<li>ATP(~500 Da) 같은 큰 분자 통과 가능</li>
</ul>
<p>세포 내 ATP ~1~5 mM, 외부 &lt;&lt; μM → <strong>10⁴배 농도 차</strong><br />
→ CALHM 열림 → <strong>ATP가 passive diffusion으로 누출</strong></p>
<p><strong>시냅스 소포 없이!</strong> ← Channel synapse</p>
<footer>2026-05-15 · Probe Lab Seminar</footer>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="channel-synapse--%EB%AF%B8%EA%B0%81%EC%9D%98-%EC%A7%84%ED%99%94%EC%A0%81-%EB%B0%9C%EB%AA%85">Channel synapse — 미각의 진화적 발명</h2>
<p>전통 시냅스 (vesicle + SNARE + exocytosis)와 완전히 다른 비전통 메커니즘.</p>
<p>진화 이유 5가지:</p>
<ol>
<li><strong>Epithelial origin</strong> — 진정 neuron 아니라 vesicle 기계 약함</li>
<li><strong>속도</strong> — fusion ~수십 ms vs 채널 게이트 ~ms</li>
<li><strong>에너지 효율</strong> — vesicle 재합성·재충전 없음</li>
<li><strong>graded 신호</strong> — 자극 강도 = 게이트 시간</li>
<li><strong>연료 풍부</strong> — ATP는 모든 세포에 mM 농도</li>
</ol>
<p>→ 미각이 잘 정의된 첫 예 (Taruno 2013)</p>
<footer>2026-05-15 · Probe Lab Seminar</footer>
</section>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="step-8--p2x2p2x3-%E2%86%92-%ED%99%9C%EB%8F%99-%EC%A0%84%EC%9C%84">Step 8 — P2X2/P2X3 → 활동 전위</h2>
<p>방출된 ATP가 시냅스 틈을 ~수 μm 확산 → 미각 신경 fiber 막의 <strong>P2X2 / P2X3</strong> (purinergic ionotropic receptor) 결합</p>
<ul>
<li>ATP 결합 → 채널 열림 → Na⁺·Ca²⁺ 유입 → 신경 막 탈분극 → 활동 전위</li>
<li><strong>P2X2 KO + P2X3 KO</strong> double 마우스: 모든 미각 응답 소실 (in vivo 결정적 증명)</li>
</ul>
<p>→ 8단계 cascade 완료. nM ligand → μM ATP 신호 → 신경의 활동 전위.</p>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="242-type-iii-%ED%9A%8C%EB%A1%9C--%EC%8B%A0%EB%A7%9B-%EC%9D%B4%EC%A4%91-%EB%A9%94%EC%BB%A4%EB%8B%88%EC%A6%98">2.4.2 Type III 회로 — 신맛 (이중 메커니즘)</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>H⁺ → OTOP1 (proton channel)
         ↓
세포 안 산성화
         ↓
   (a) Kir2.1 channel을 H⁺이 직접 block
   (b) OTOP1으로 들어온 H⁺ 자체 양이온 부하
         ↓
   막 탈분극 (두 효과 합)
         ↓
   VGCC → Ca²⁺ 외부 유입
         ↓
   5-HT vesicle exocytosis (전통 시냅스)
         ↓
   미각 신경 5-HT3R → 활동 전위
</code></pre>
<p>→ 두 메커니즘이 합쳐야 신뢰성 있게 임계점 초과</p>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Na⁺ → ENaC (α/β/γ heterotrimer) → Na⁺ 유입 → 즉시 탈분극

<ul>
<li>ENaC 항상 부분 개방, gradient로 자동 유입</li>
<li><strong>amiloride</strong> = 차단제 → 약한 짠맛 사라지고 강한 짠맛 남음</li>
</ul>
<table>
<thead>
<tr>
<th>농도</th>
<th>회로</th>
<th>평가</th>
</tr>

<td>&quot;맛있다&quot; — 미네랄</td>
</tr>
<tr>

</tr>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="24-%EC%84%B8-%ED%9A%8C%EB%A1%9C%EC%9D%98-%EA%B3%B5%ED%86%B5-%EC%A7%84%ED%99%94-%EC%9B%90%EB%A6%AC">2.4 세 회로의 공통 진화 원리</h2>
<ol>
<li><strong>분자 복잡도 = 회로 복잡도</strong> — 다양한 organic → GPCR; 단순 이온 → 채널</li>
<li><strong>Ca²⁺이 보편 통화</strong> — 세 회로 모두 Ca²⁺ 상승을 거침</li>
<li><strong>출력 분자가 modality 결정</strong> — ATP / 5-HT / ? → labeled lines의 분자 기반</li>
<li><strong>Channel synapse는 새 발명</strong> — epithelial origin이 만든 우회로</li>
<li><strong>분자 같아도 cell 다르면 의미 다름</strong> — 뇌가 &quot;주소&quot;를 본다</li>
</ol>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="25-%EB%B6%84%EC%9E%90-%E2%86%92-%EB%87%8C-routing">2.5 분자 → 뇌 routing</h2>
<p>같은 ATP라도 <strong>어느 세포에서 나왔는지가 modality</strong>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>[단맛 세포] (T1R2/T1R3) → ATP ─→ 단맛 fiber → NTS 단맛 → insula 단맛
[쓴맛 세포] (T2R)       → ATP ─→ 쓴맛 fiber → NTS 쓴맛 → insula 쓴맛
[감칠 세포] (T1R1/T1R3) → ATP ─→ 감칠 fiber → NTS 감칠 → insula 감칠
[신 세포]   (OTOP1)     → 5-HT ─→ 신 fiber  → NTS 신  → insula 신
[짠 세포]   (ENaC)      → ?    ─→ 짠 fiber  → NTS 짠  → insula 짠
</code></pre>
<p><strong>비유 — 택배</strong>: 같은 트럭(ATP), 발신지·수신지가 다르면 routing이 정보.</p>
<p>말초 → NTS(연수) → VPM 시상 → 1차 미각 피질 → <strong>OFC</strong> → 보상 회로</p>
<footer>2026-05-15 · Probe Lab Seminar</footer>

<h2 id="31-4%EB%8C%80-%ED%86%B5%EC%84%A4-200%EB%85%84">3.1 4대 통설 (200년)</h2>
<p>19세기~20세기 중반 교과서:</p>
<blockquote>
<p><strong>단(sweet) · 짠(salty) · 신(sour) · 쓴(bitter)</strong></p>
</blockquote>
<p>각 맛의 본유 hedonic:</p>
<ul>
<li><strong>단</strong> = 영양 (탄수화물) → 양의 신호</li>
<li><strong>짠</strong> = 미네랄·체액 항상성 → 농도 의존</li>
<li><strong>신</strong> = 익은 과일 / 부패 → 양가</li>
<li><strong>쓴</strong> = 식물 독 회피 → 음의 신호</li>
</ul>
<p>그러나 한 가지가 빠져 있었다.</p>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="32-1908%EB%85%84-5%EB%B2%88%EC%A7%B8-%EB%A7%9B%EC%9D%98-%EB%B0%9C%EA%B2%AC">3.2 1908년, 5번째 맛의 발견</h2>
<p><strong>池田菊苗 (Ikeda Kikunae)</strong> — 도쿄제국대학 화학과 교수</p>
<p>다시마 국물에서 **글루탐산 sodium 염 (MSG)**을 분리:</p>
<blockquote>
<p><strong>&quot;うま味 (umami)&quot;</strong> — 旨い味 = &quot;맛있는 맛&quot;</p>
</blockquote>
<p>학계 반응은 차가웠다 → 100년의 검증:</p>
<ul>
<li><strong>2000년</strong> — T1R3 수용체 동정 (Adler et al.)</li>
<li><strong>2002년</strong> — T1R1/T1R3 → 글루탐산 응답 (Nelson, <em>Nature</em>)</li>
<li><strong>2008년</strong> — T1R1 VFT cleft + IMP allosteric (Zhang, <em>PNAS</em>)</li>
</ul>
<p><strong>5대 기본맛 = 표준</strong> (지각 독립성 + 전용 수용체·신경 + 생물학적 의의)</p>
<footer>2026-05-15 · Probe Lab Seminar</footer>
</section>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="34-t1r2t1r3--3%EC%B8%B5-%EA%B5%AC%EC%A1%B0-class-c-gpcr">3.4 T1R2/T1R3 — 3층 구조 (Class C GPCR)</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>┌──────────────────────────────────────┐
│  ATD/VFT — Venus Flytrap            │ ← sugar 받는 큰 cleft
│  (식충식물 입처럼 여닫힘)            │
├──────────────────────────────────────┤
│  CRD — Cysteine-Rich Domain         │ ← 신호 전달 도관
├──────────────────────────────────────┤
│  TMD — 7개 막 관통 helix             │ ← 일반 GPCR 본체
├──────────────────────────────────────┤
│  C-tail (intracellular)              │ ← G-protein 결합
└──────────────────────────────────────┘
</code></pre>
<p>T1R2 + T1R3가 <strong>세 층 모두에서</strong> dimer 인터페이스 → 한 단위로 작동</p>
<footer>2026-05-15 · Probe Lab Seminar</footer>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="34-%EB%8B%A8%EB%A7%9B-%EB%B6%84%EC%9E%90--5%EA%B0%80%EC%A7%80-%EA%B2%B0%ED%95%A9-%EC%9E%90%EB%A6%AC">3.4 단맛 분자 — 5가지 결합 자리</h2>
<p>&quot;VFT cleft에 들어간다&quot; 한 마디 안에 다섯 곳이 숨어 있다.</p>
<table>
<thead>
<tr>
<th>단맛 분자</th>
<th>결합 부위</th>
</tr>
</thead>
<tbody>
<tr>
<td>자연 당 (sucrose, glucose)</td>
<td><strong>T1R2 VFT cleft</strong> (주)</td>
</tr>
<tr>
<td>합성 감미료 (aspartame, sucralose)</td>
<td>T1R2 VFT cleft</td>
</tr>
<tr>
<td><strong>Cyclamate, NHDC</strong></td>
<td><strong>T1R3 TMD pocket</strong> ← 다른 위치</td>
</tr>
<tr>
<td><strong>단백질 감미료 (thaumatin)</strong></td>
<td><strong>T1R3 외부 표면</strong> + CRD</td>
</tr>
<tr>
<td>Lactisole (차단제)</td>
<td>T1R3 TMD allosteric</td>
</tr>
</tbody>
</table>
<p>→ 인공 감미료 가열 안정성·뒤끝 다른 이유 = <strong>결합 자리 분리</strong></p>

<h2 id="34-ah-b-x-%EB%AA%A8%EB%8D%B8--%EB%8B%A8%EB%A7%9B%EC%9D%98-%ED%99%94%ED%95%99%EC%A0%81-%EC%A0%95%EC%9D%98">3.4 AH-B-X 모델 — 단맛의 화학적 정의</h2>
<p>Shallenberger·Acree (1967), Kier (1972)</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>       AH ────── B
        │  ~3 Å  │
        │        │
        └─ ~5 Å ─ X

   AH = H-bond donor (–OH, –NH₂)
   B  = H-bond acceptor (=O, –O–)
   X  = 소수성 그룹 (ring)
</code></pre>
<p>이 삼각형이 T1R2 VFT cleft 내벽 잔기 3자리에 동시 맞물려야 단맛 신호</p>
<p><strong>Sucrose 매핑</strong>: glucose C6-OH / glycosidic O / ring 골격</p>

<h2 id="34-sucrose-%EA%B2%B0%ED%95%A9-%EC%9E%94%EA%B8%B0--k_d">3.4 Sucrose 결합 잔기 + K_d</h2>
<p>cleft에서 sucrose와 결합하는 T1R2 잔기:</p>
<ul>
<li><strong>Ser144, Tyr103, Asp142, Glu302</strong> — H-bond 4개</li>
<li><strong>Phe35, Phe186</strong> — 소수성 접촉 2개</li>
<li>총 ~4~6 H-bond + 2~3 van der Waals</li>
</ul>
<p>→ <strong>K_d ≈ 50 mM</strong> (약한 결합)<br />
→ 입에서 단맛 느끼려면 sucrose 농도 ~1.7~17%<br />
→ <strong>일상에서 설탕 한 스푼씩 넣는 분자 이유</strong></p>

<h2 id="35-%EC%A7%A0%EB%A7%9B">3.5 짠맛</h2>
<ul>
<li><strong>분자</strong>: Na⁺·K⁺·Mg²⁺·Ca²⁺ (소금)</li>
<li><strong>수용체</strong>: ENaC (저농도) + 미해결 회로 (고농도)</li>
<li><strong>식품</strong>: 소금, 간장, 김치, 햄</li>
</ul>
<p><strong>0.9% NaCl의 비밀</strong> — 인간이 가장 맛있는 짠 농도 = <strong>혈장 등장액 = 생리식염수</strong></p>
<p>→ 우리 몸 체액과 일치하는 농도가 가장 자연스럽게 느껴지도록 진화</p>
<p>(부록 D에서 강한 짠맛의 두 번째 회로)</p>
<footer>2026-05-15 · Probe Lab Seminar</footer>

<h2 id="37-t2r-25%EC%A2%85--%EC%96%B4%EB%A6%B0%EC%9D%B4-%EB%B0%9C%EB%8B%AC">3.7 T2R 25종 + 어린이 발달</h2>
<ul>
<li><strong>T2R = 사람 ~25종</strong> (다른 GPCR family보다 많음)</li>
<li>한 cell이 <strong>다수 T2R 동시 발현</strong> → &quot;쓴 분자라면 뭐든 잡음&quot;</li>
<li>사람이 카페인과 quinine 구분 못 하는 이유 — <strong>광범위 안전망 우선</strong></li>
</ul>
<p><strong>어린이는 쓴맛 거부가 강함</strong>:</p>
<ul>
<li>T2R 민감도 ↑ + 발달 단계의 보호 신호</li>
<li>어른은 학습으로 일부 수용 (커피, 맥주, 다크초콜릿) — 단·감칠 동반 학습</li>
</ul>
<p>(부록 D에서 자세히)</p>
<footer>2026-05-15 · Probe Lab Seminar</footer>
</section>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="38-yamaguchi-%EC%8B%9C%EB%84%88%EC%A7%80-1967">3.8 Yamaguchi 시너지 (1967)</h2>
<p>MSG + IMP / GMP 조합이 <strong>단순 합산보다 8배 이상 강한 감칠</strong>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>y = u + γ · u · v
</code></pre>
<ul>
<li>u, v: 각 분자 농도</li>
<li>γ: 시너지 계수 (IMP γ=1218, GMP γ=2800)</li>
</ul>
<p><strong>한식·일식의 분자적 핵심</strong>:</p>
<ul>
<li><strong>다시 = 다시마(Glu) + 가쓰오부시(IMP)</strong> → 감칠 폭탄</li>
<li>한식에서 멸치(IMP) + 다시마(Glu), 김치(Glu + lactic)</li>
<li>(부록 A에서 자세히)</li>
</ul>
<footer>2026-05-15 · Probe Lab Seminar</footer>
</section>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Glu가 cleft에 들어감 → VFT 닫힘 → 7TM 활성 → gustducin → ATP 신호
        ↑

</code></pre>
<p>→ Glu만 있을 때보다 IMP 함께 있으면 <strong>closed conformation이 안정</strong> = 신호 증폭</p>
<p>Zhang 2008 <em>PNAS</em>에서 결정 구조로 확인된 협동 모델.</p>
<p>(왜 글루탐산이 산인데 신맛 아닌 감칠인지는 부록 E)</p>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="44-%EB%8B%A8--%EC%A7%A0--%EC%86%8C%EA%B8%88-%EC%BA%90%EB%9F%AC%EB%A9%9C%EC%9D%98-%EB%B9%84%EB%B0%80">4.4 단 + 짠 — 소금 캐러멜의 비밀</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>[단독] 설탕 10% → 단순한 단맛
[조합] 설탕 10% + 소금 0.1% → 더 풍부한·복합적 단맛
</code></pre>
<p>메커니즘 (가설):</p>
<ol>
<li>적은 Na⁺이 K⁺ 차단 → 단맛 신호 약간 증폭</li>
<li>단·짠이 같은 OFC 영양 신호로 통합 → hedonic ↑</li>
<li>단의 단조성을 짠이 분절·강조</li>
</ol>
<p>응용: 소금 캐러멜, 단팥(소금 약간), 슈크림, 멸치+꿀</p>
<footer>2026-05-15 · Probe Lab Seminar</footer>
</section>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="45-%EC%A7%A0--%EA%B0%90%EC%B9%A0--%ED%95%9C%EC%8B%9D%EC%9D%98-%EB%B6%84%EC%9E%90%EC%A0%81-%ED%95%B5%EC%8B%AC">4.5 짠 + 감칠 — 한식의 분자적 핵심</h2>
<p><strong>가장 강한 시너지</strong> — 인간이 가장 일관되게 &quot;맛있다&quot;고 평가</p>
<p>이유: <strong>단백질 + 미네랄 = 영양의 가장 좋은 신호</strong> (진화적 사냥감·발효식품)</p>
<p>분자 메커니즘:</p>
<ul>
<li>Na⁺이 T1R1/T1R3 결합 affinity 강화 (allosteric)</li>
<li>신경 통합에서 같은 OFC 영역에서 강화</li>
</ul>
<p>응용 (한식의 거의 전부):</p>
<ul>
<li><strong>간장·된장·김치·치즈·다시+소금</strong></li>
</ul>
<blockquote>
<p>한식·일식 발효식품 = 짠+감칠 시너지를 분자적으로 극대화한 진화</p>
</blockquote>
<footer>2026-05-15 · Probe Lab Seminar</footer>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="46-%EB%8B%A8--%EC%8B%A0--%EC%9D%B5%EC%9D%80-%EA%B3%BC%EC%9D%BC">4.6 단 + 신 — 익은 과일</h2>
<p>레모네이드 황금비:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>설탕 : 식초 ≈ 10 : 1 (질량)
</code></pre>
<ul>
<li>화학적 중화 X (sucrose 안 산성)</li>
<li>진짜 메커니즘: <strong>신경 단계 mixture suppression</strong>
<ul>
<li>NTS·insula에서 단맛 신호가 신맛 인지 약화</li>
<li>OFC에서 단의 양 신호가 신의 sharpness 완화</li>
</ul>
</li>
</ul>
<p>진화적 의미: <strong>익은 과일 식별 회로</strong></p>
<ul>
<li>풋과일 = 신↑ 단↓ → 회피</li>
<li>익은 과일 = 신↓ 단↑ → 추구</li>
</ul>
<footer>2026-05-15 · Probe Lab Seminar</footer>

<h2 id="47-%EB%86%8D%EB%8F%84-goldilocks--09-%EB%B9%84%EB%B0%80">4.7 농도 Goldilocks + 0.9% 비밀</h2>
<table>
<thead>
<tr>
<th>Modality</th>
<th>검지역치</th>
<th>최대 쾌감</th>
<th>거부 시작</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>단</strong></td>
<td>~10 mM</td>
<td>단조 ↑</td>
<td>~20% (포화)</td>
</tr>
<tr>
<td><strong>짠</strong></td>
<td>~10 mM</td>
<td><strong>0.9% (혈장)</strong></td>
<td>~3% (바닷물)</td>
</tr>
<tr>
<td><strong>신</strong></td>
<td>pH ~4</td>
<td>약~중 (맥락)</td>
<td>pH &lt; 2.5</td>
</tr>
<tr>
<td><strong>쓴</strong></td>
<td>~10 μM</td>
<td>거의 X</td>
<td>거의 모든 농도</td>
</tr>
<tr>
<td><strong>감칠</strong></td>
<td>~3 mM</td>
<td>단조 ↑ + 시너지</td>
<td>진한 농도 드묾</td>
</tr>
</tbody>
</table>
<p><strong>0.9% NaCl = 혈장 등장액 = 생리식염수</strong> — 체액과 일치하는 농도가 가장 맛있게 진화</p>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="48-%EC%93%B4%EB%A7%9B--%EC%97%86%EB%8A%94-%EA%B2%83%EC%9D%B4-%EC%A2%8B%EC%9D%8C">4.8 쓴맛 = &quot;없는 것이 좋음&quot;</h2>
<p>5대 기본맛 중 <strong>쓴맛만 거의 모든 농도에서 거부 신호</strong>.</p>
<ul>
<li>자연의 독 = 쓴 분자 (alkaloid, glucosinolate, polyphenol, cardenolide)</li>
<li>T2R 25종으로 <strong>광범위 검출</strong> → &quot;어떤 독이 와도 같은 경고: 뱉어라&quot;</li>
</ul>
<p><strong>학습된 쓴맛 수용</strong>:</p>
<ul>
<li>커피·맥주·다크초콜릿·차 → 단·감칠 동반 학습</li>
<li>어린이는 거부 강함 (T2R 민감도 ↑ + 발달 보호)</li>
</ul>
<p>응용: 약 코팅 단맛, 약 50%가 식물 alkaloid 유래라 약은 거의 쓰다 (부록 D)</p>
<footer>2026-05-15 · Probe Lab Seminar</footer>

<h2 id="49-ofc--%EB%8B%A4%EC%A4%91-%EC%8B%A0%ED%98%B8-%ED%86%B5%ED%95%A9">4.9 OFC — 다중 신호 통합</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>[혀 5 미각]
[후각 (orthonasal + retronasal)]

[감정·사회 맥락]                              행동
</code></pre>

<h2 id="49-berridge--wanting-vs-liking">4.9 Berridge — wanting vs liking</h2>
<ul>
<li><strong>Liking</strong> = 음식 자체의 즐거움 (hedonic)</li>
<li><strong>Wanting</strong> = 얻으려는 동기 (motivational)</li>
</ul>
<p>둘이 <strong>분리될 수 있음</strong> — 약물 중독에서 강한 wanting + 약한 liking</p>
<p>→ &quot;맛있다&quot;는 단순 점수가 아니라 <strong>여러 차원의 평가</strong>의 종합 신호</p>
<footer>2026-05-15 · Probe Lab Seminar</footer>

<h2 id="410-%EB%AF%B8%EA%B0%81%EC%9D%98-%EC%97%AD%ED%95%A0--%ED%95%84%EC%9A%94%EC%A1%B0%EA%B1%B4%EC%9D%B4%EC%A7%80-%EC%B6%A9%EB%B6%84%EC%A1%B0%EA%B1%B4-%EC%95%84%EB%8B%98">4.10 미각의 역할 — 필요조건이지 충분조건 아님</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>[미각 밸런스 OK]   → 맛있을 수도, 그저 그럴 수도 (사람마다 갈림)
[미각 밸런스 깨짐] → 거의 모두 &quot;맛없다&quot; 확정
</code></pre>
<p>미각 = <strong>gatekeeper</strong>. 통과 못 하면 다른 신호 무력화.</p>
<table>
<thead>
<tr>
<th>단계</th>
<th>무엇을 하나</th>
<th>역할</th>
</tr>
</thead>
<tbody>
<tr>
<td>1차 — 미각 밸런스</td>
<td>짠·단·신·쓴·감칠 농도 적정</td>
<td>&quot;맛없다&quot; 회피 (필요조건)</td>
</tr>
<tr>
<td>2차 — 차별화</td>
<td>향·텍스처·맥락</td>
<td>&quot;맛있다&quot; 만들기 (사람마다 다름)</td>
</tr>
</tbody>
</table>
<blockquote>
<p><strong>&quot;맛없는 음식엔 합의, 최고 맛있는 음식엔 합의 안 됨&quot;</strong></p>
</blockquote>

<h2 id="411-%ED%95%9C-%EC%A4%84-%EC%9A%94%EC%95%BD">4.11 한 줄 요약</h2>
<blockquote>
<p><strong>&quot;맛있다&quot; = 5대 기본맛의 본유 hedonic × modality 쌍 간 시너지·억제 × 농도 적정성 × 항상성·학습·문화 가중치 → OFC의 양의 가치 평가.</strong></p>
</blockquote>
<p>또는 짧게:</p>
<blockquote>
<p><strong>요리 = modality 가중치 + 다중모달 패턴의 조정 기술.</strong> 짠+감칠 시너지·단+신 가림·향과의 일치 등 진화 회로를 활용한 hedonic 최대화.</p>
</blockquote>

</tr>
<tr>
<td>8. 식초 단독</td>
<td>시기만 함</td>
<td>OTOP1 단독 — 부정적</td>
</tr>
<tr>
<td>9. 미원 + 소금 + 식초 + 육수</td>
<td><strong>'맛있다' 임계 도달</strong></td>
<td>다중 시너지 + 향까지</td>
</tr>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="%EB%B0%9C%ED%91%9C%EC%9E%90-%EC%8B%A4%ED%97%98--%EA%B2%B0%EB%A1%A0">발표자 실험 — 결론</h2>
<p>핵심 발견:</p>
<ol>
<li><strong>0.9% 짠맛이 단독으로도 충분히 맛있다</strong> — 혈장 등장액 신호</li>
<li><strong>소금 + 감칠</strong>이 가장 강한 시너지 — 한식 분자 핵심</li>
<li><strong>신맛은 다른 modality와 결합해야 맛있다</strong> (단·감칠 동반)</li>
<li><strong>향(육수코인)이 더해지면</strong> 전체 통합이 한 단계 위로 — flavor의 큰 부분 확인</li>
</ol>
<p>→ <strong>단·감칠·짠 균형 + 신은 미세 조정 + 향 = 풍성한 맛</strong></p>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="61-1%EC%8B%9C%EA%B0%84-30%EB%B6%84%EC%9D%98-%EC%97%AC%EC%A0%95-%EC%A0%95%EB%A6%AC">6.1 1시간 30분의 여정 정리</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>혀의 papillae 4종 (모양·위치·기능)
    ↓
미뢰의 양파형 구조 + 4종 세포 (Type I/II/III/IV)
    ↓
세포 내 transduction (GPCR cascade vs OTOP1 vs ENaC)
    ↓
미각 신경 → NTS → 시상 → 1차 미각 피질(insula) → OFC
    ↓
다중모달 통합 + 가치 평가 + 보상 회로
    ↓
&quot;맛있다 / 맛없다&quot; 행동
</code></pre>
<p>각 단계에 진화의 흔적. 모두가 매일 먹고 평가하는 행동의 분자 기반.</p>

<h2 id="63-%ED%95%B5%EC%8B%AC-%EB%A9%94%EC%8B%9C%EC%A7%80-3%EA%B0%80%EC%A7%80">6.3 핵심 메시지 3가지</h2>

<li><strong>곡선의 모양 자체가 진화 우선순위</strong> — 영양 단조↑ / 항상성 inverted-U / 위험 단조↓</li>
</ol>

<h2 id="a-%ED%95%9C%EC%8B%9D%EC%9D%98-5%EC%B6%95-%EC%8B%9C%EB%84%88%EC%A7%80">A. 한식의 5축 시너지</h2>
<p>한식의 거의 모든 발효식품 = <strong>짠 + 감칠 시너지</strong>의 분자적 극대화</p>
<table>
<thead>
<tr>
<th>식품</th>
<th>Glu source</th>
<th>짠 source</th>
<th>IMP source</th>
</tr>
</thead>
<tbody>
<tr>
<td>다시</td>
<td><strong>다시마</strong></td>
<td>(조정)</td>
<td><strong>가쓰오부시</strong></td>
</tr>
<tr>
<td>멸치 다시</td>
<td>(작)</td>
<td>(조정)</td>
<td><strong>멸치</strong></td>
</tr>
<tr>
<td>김치</td>
<td><strong>lactic 발효</strong></td>
<td>소금</td>
<td>(작)</td>
</tr>
<tr>
<td>간장·된장</td>
<td><strong>koji 발효</strong></td>
<td>소금</td>
<td>(작)</td>
</tr>
<tr>
<td>표고 육수</td>

</table>
<p>→ <strong>식물 + 동물 + 곰팡이</strong> 3차 시너지 = 다양한 농산물 환경의 진화적 응답</p>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="b-tas2r-polymorphism">B. TAS2R polymorphism</h2>
<p>오이의 일부 개체는 <strong>cucurbitacin</strong> (강력한 쓴 분자) 함유</p>
<p>사람의 <strong>TAS2R14</strong> 유전자에 SNP 다형성 → cucurbitacin 인식 강도 차이</p>
<table>
<thead>
<tr>
<th>genotype</th>
<th>쓴맛 감각</th>
</tr>
</thead>
<tbody>
<tr>
<td>TT (highly sensitive)</td>
<td>강한 쓴맛</td>
</tr>
<tr>
<td>TC</td>
<td>중간</td>
</tr>
<tr>
<td>CC</td>
<td>거의 안 느낌</td>
</tr>
</tbody>
</table>
<p><strong>Toxic Squash Syndrome</strong> <img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> — 호박류 cucurbitacin 과다는 위장 손상·탈모. 강한 쓴맛이 안전 신호이지만 supertaster만 명확히 감지.</p>
<p>→ &quot;오이 싫어&quot;는 유전형의 표현일 수 있음</p>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="c-turnover--%ED%95%AD%EC%95%94%EC%A0%9C">C. Turnover + 항암제</h2>
<p>미뢰 세포 <strong>10~14일 주기 교체</strong>:</p>
<ul>
<li><strong>Type IV stem cell</strong>이 <strong>Shh/Wnt 신호</strong>로 분화 → Type I/II/III</li>
<li>항상 새로 만들어지는 동적 조직</li>
</ul>
<p><strong>Hedgehog inhibitor (LDE225 등 항암제)</strong>:</p>
<ul>
<li>Smoothened (Smo) 차단 → Shh 신호 끊김</li>
<li>미뢰 분화 회로 정지</li>
<li>→ <strong>항암 치료 중 미각 상실/변형</strong></li>
</ul>
<p>→ 미뢰가 끊임없이 재생되는 이유 = 분자 닳음·손상 빈번한 환경에서 신호 신뢰성 유지</p>
<footer>2026-05-15 · Probe Lab Seminar</footer>

<h2 id="d-%EC%8B%9D%EB%AC%BC-secondary-metabolites-6-%ED%81%B4%EB%9E%98%EC%8A%A4">D. 식물 secondary metabolites 6 클래스</h2>
<table>
<thead>
<tr>
<th>클래스</th>
<th>예</th>

</tr>
</thead>
<tbody>
<tr>
<td>Alkaloid</td>

<header>맛의 원리 — Principles of Taste · Suhwan</header>
<h2 id="e-carboxylate-vs-h%E2%81%BA--%EB%B6%84%EC%9E%90%EC%A0%81-%EB%B6%84%EB%A6%AC">E. Carboxylate vs H⁺ — 분자적 분리</h2>
<p>글루탐산 = 약산 (α-COOH·γ-COOH·α-NH₃⁺ 세 ionizable)</p>
<p>식품 환경 (중성 pH ~7):</p>
<ul>
<li><strong>Carboxylate (-COO⁻) 형태</strong> 우세</li>
<li>자유 H⁺ 농도 낮음 → <strong>OTOP1 자극 X</strong></li>
<li><strong>T1R1/T1R3가 carboxylate 인식 → 감칠 활성</strong></li>
</ul>
<p>자유 글루탐산 (산성 환경):</p>
<ul>
<li><strong>-COOH + H⁺</strong> 형태 함께</li>
<li>OTOP1도 활성 + T1R1/T1R3도 활성 → <strong>신 + 감칠</strong> 함께</li>
</ul>
<p>→ 같은 분자라도 <strong>이온화 상태가 modality 결정</strong>. 식품 pH가 신경 신호의 modality를 가른다.</p>
<footer>2026-05-15 · Probe Lab Seminar</footer>

<h1 id="%EB%A7%88%EC%A7%80%EB%A7%89-%ED%95%9C-%EB%A7%88%EB%94%94">마지막 한 마디</h1>
<p>미각의 분자→신경→평가는:</p>
<ul>
<li><strong>다양성</strong> (단·감칠·쓴) → GPCR + 긴 cascade + ATP channel synapse</li>
<li><strong>항상성</strong> (짠·신) → 빠른 채널 회로 + 좁은 농도 창</li>
<li><strong>위험 회피</strong> (쓴·고농도 신·짠) → 단조 거부</li>
<li><strong>통합 평가</strong> (&quot;맛있다&quot;) → OFC 다중모달 가중 합산 + 학습·문화</li>
</ul>
<p>진화가 새긴 <strong>음식 품질 + 안전 + 영양의 분자 평가 system</strong>.</p>
<blockquote>
<p>정량 곡선의 모양 자체가 진화 우선순위다.</p>
</blockquote>
<p>감사합니다.</p>
